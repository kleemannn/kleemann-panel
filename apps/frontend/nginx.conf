server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Tighten headers a bit; adjust for Telegram WebApp embedding.
  add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org";
  add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://telegram.org 'self'";

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public";
  }
}
