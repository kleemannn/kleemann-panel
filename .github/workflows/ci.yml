name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @kleemann/backend exec prisma generate
      - run: pnpm --filter @kleemann/backend typecheck
      - run: pnpm --filter @kleemann/frontend typecheck
      - run: pnpm --filter @kleemann/backend build
      - run: pnpm --filter @kleemann/frontend build
